<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Tech Feed - Neural Nexus-17</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b132b, #1c2541, #0a0f2c);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 50px 0; }
        .header h1 { 
            color: #38bdf8; 
            font-size: 2.8rem; 
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }
        .header p { opacity: 0.8; font-size: 1.1rem; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .news-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .news-card:hover {
            transform: translateY(-8px);
            border-color: #38bdf8;
            box-shadow: 0 15px 40px rgba(56, 189, 248, 0.2);
        }
        .news-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        .news-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .news-content h3 {
            font-size: 1.25rem;
            color: #38bdf8;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }
        .news-content p {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .read-more-btn {
            margin-top: auto;
            text-align: center;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0b132b;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .read-more-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }
        .back-home {
            text-decoration: none;
            color: #38bdf8;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #38bdf8;
            padding: 8px 18px;
            border-radius: 50px;
            transition: 0.3s;
            display: inline-block;
        }
        .back-home:hover { background: #38bdf8; color: #0b132b; }
        #loader { text-align: center; margin-top: 100px; color: #38bdf8; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <div style="padding-top: 20px;">
        <a href="index.html" class="back-home">← Back to Nexus Home</a>
    </div>

    <div class="header">
        <h1>Global Tech Feed 🚀</h1>
        <p>Live insights from the world of Innovation & Technology</p>
    </div>

    <div id="loader">Syncing with global servers...</div>
    <div id="news-container" class="news-grid"></div>
</div>

<script>
    async function fetchGlobalTechNews() {
        const container = document.getElementById('news-container');
        const loader = document.getElementById('loader');
        
        // rss2json API through TechCrunch
        const techCrunchFeed = "https://api.rss2json.com/v1/api.json?rss_url=https://techcrunch.com/feed/";

        try {
            const response = await fetch(techCrunchFeed);
            const data = await response.json();

            if (data.status === 'ok') {
                loader.style.display = 'none';
                container.innerHTML = "";

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    
                    const image = item.thumbnail || item.enclosure.link || 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=1000';

                    card.innerHTML = `
                        <img src="${image}" alt="News Image">
                        <div class="news-content">
                            <h3>${item.title}</h3>
                            <p>${item.description.replace(/<[^>]*>?/gm, '').substring(0, 130)}...</p>
                            <a href="${item.link}" target="_blank" class="read-more-btn">Read Full Story</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        } catch (error) {
            loader.innerHTML = "Feed sync failed. Please check your connection.";
        }
    }

    window.onload = fetchGlobalTechNews;
</script>

</body>
</html>
